name: Build Backend Image

on:
  push:
    branches:
      - main
      - Dev

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push image
        run: |
          # Convert the repository name to lowercase
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          # Get branch name and convert to lowercase (Dev -> dev)
          BRANCH_NAME=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]')
          
          # Determine the tag: use "latest" for main, otherwise use branch name
          if [ "$BRANCH_NAME" = "main" ]; then
            TAG="latest"
          else
            TAG="$BRANCH_NAME"
          fi

          IMAGE_URL="ghcr.io/${REPO_LOWER}/backend:${TAG}"

          echo "Building image: $IMAGE_URL"
          docker build -t $IMAGE_URL .
          
          echo "Pushing image: $IMAGE_URL"
          docker push $IMAGE_URL